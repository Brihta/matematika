<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brihta-MAT</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- TOOLBAR -->
  <div class="toolbar collapsed" id="toolbar">
    <div class="toolbar-top">
      <div class="brand">
        <img class="brand-icon" id="brandImg" src="Brihta.svg" alt="">
        <span>Brihta</span>
      </div>
      <button class="summary-chip" id="summaryChip" title="Klikni za nastavitve">
        <span id="summaryMode">🎯 Kviz</span>
        <span class="summary-sep">·</span>
        <span id="summaryOp">× ÷</span>
        <span class="summary-sep">·</span>
        <span id="summaryFilter">Vse</span>
        <span class="summary-arrow" id="summaryArrow">▾</span>
      </button>
    </div>

    <div class="toolbar-controls-wrap" id="toolbarControlsWrap">
      <div class="toolbar-controls">

        <div class="ctrl-block">
          <div class="ctrl-label">Način</div>
          <div class="btn-group" id="modeBtnGroup">
            <button class="seg-btn" data-mode="keypad">⌨️ Tipkovnica</button>
            <button class="seg-btn active" data-mode="quiz">🎯 Kviz</button>
            <button class="seg-btn" data-mode="timed">⏱️ Tekma</button>
          </div>
        </div>

        <div class="ctrl-block">
          <div class="ctrl-label">Vrsta računa</div>
          <div class="btn-group" id="opBtnGroup">
            <button class="seg-btn active" data-op="both">× ÷</button>
            <button class="seg-btn" data-op="multiply">×</button>
            <button class="seg-btn" data-op="divide">÷</button>
          </div>
        </div>

        <div class="ctrl-block">
          <div class="ctrl-label-row">
            <span class="ctrl-label">Poštevanke</span>
            <div class="quick-group">
              <button class="quick-btn" id="selAll">Vse</button>
              <button class="quick-btn" id="selNone">Nič</button>
            </div>
          </div>
          <div class="filter-row" id="filterRow">
            <button class="table-btn active" data-n="1">1</button>
            <button class="table-btn active" data-n="2">2</button>
            <button class="table-btn active" data-n="3">3</button>
            <button class="table-btn active" data-n="4">4</button>
            <button class="table-btn active" data-n="5">5</button>
            <button class="table-btn active" data-n="6">6</button>
            <button class="table-btn active" data-n="7">7</button>
            <button class="table-btn active" data-n="8">8</button>
            <button class="table-btn active" data-n="9">9</button>
            <button class="table-btn active" data-n="10">10</button>
          </div>
        </div>

      </div>
    </div>
  </div>

  <!-- SCORE HUD -->
  <div id="scoreHUD" class="score-hud" style="display:none">
    <div class="score-item score-correct">
      <span class="score-val" id="scoreCorrect">0</span>
      <span class="score-lbl">✅ Pravilno</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item score-wrong">
      <span class="score-val" id="scoreWrong">0</span>
      <span class="score-lbl">❌ Napačno</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item score-pct">
      <span class="score-val" id="scorePct">—</span>
      <span class="score-lbl">🎯 Točnost</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item score-medal" id="medalItem" title="Klikni za seznam medalj">
      <div id="hudMedalSVG"></div>
      <span class="hud-medal-name" id="hudMedalName">Lesena</span>
      <span class="hud-medal-next" id="hudMedalNext">še 30 do Železne</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item">
      <span class="streak-hud" id="hudStreak" style="display:none"></span>
    </div>
  </div>

  <!-- QUIZ PANEL -->
  <div id="quizPanel" class="quiz-panel">
    <div id="quizArea" class="quiz-area">
      <div class="quiz-empty">Izberi nastavitve in začni! 🎯</div>
    </div>
  </div>

  <!-- KEYPAD PANEL -->
  <div id="keypadPanel" class="keypad-panel" style="display:none">
    <div id="keypadArea" class="keypad-area">
      <div class="quiz-empty">Izberi nastavitve in začni! ⌨️</div>
    </div>
  </div>

  <!-- TIMED PANEL -->
  <div id="timedPanel" class="timed-panel" style="display:none">
    <div id="timedArea" class="timed-area">
      <div class="quiz-empty">Izberi nastavitve in začni! ⏱️</div>
    </div>
  </div>

</div>

<!-- MEDAL INFO MODAL -->
<div class="medal-modal" id="medalModal" style="display:none">
  <div class="medal-modal-box">
    <button class="medal-modal-close" id="medalModalClose" title="Zapri">✕</button>
    <h2 class="medal-modal-title">🏅 Medalje</h2>
    <p class="medal-modal-subtitle">Koliko pravilnih odgovorov potrebuješ za vsako medaljo</p>
    <div class="medal-list" id="medalList"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
