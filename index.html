<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brihta</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <!-- TOOLBAR -->
  <div class="toolbar" id="toolbar">
    <div class="toolbar-top">
      <div class="brand">
        <img class="brand-icon" id="brandImg" src="Brihta.png" alt="">
        <span>Brihta</span>
      </div>
      <div class="toolbar-summary">
        <span id="summaryMode">🃏 Kartice</span>
        <span class="summary-sep">·</span>
        <span id="summaryOp">× ÷</span>
        <span class="summary-sep">·</span>
        <span id="summaryFilter">Vse</span>
      </div>
      <button class="toolbar-toggle-btn" id="toolbarToggle">⚙️</button>
    </div>

    <div class="toolbar-controls-wrap" id="toolbarControlsWrap">
      <div class="toolbar-controls">

        <div class="ctrl-group">
          <label class="ctrl-label">Način</label>
          <select id="modeSelect" class="select">
            <option value="flashcard">🃏 Kartice</option>
            <option value="quiz">🎯 Kviz</option>
            <option value="timed">⏱️ Tekma s časom</option>
          </select>
        </div>

        <div class="ctrl-group">
          <label class="ctrl-label">Vrsta</label>
          <div class="op-btn-group">
            <button class="op-btn active" data-op="both">× ÷</button>
            <button class="op-btn" data-op="multiply">×</button>
            <button class="op-btn" data-op="divide">÷</button>
          </div>
        </div>

        <div class="ctrl-group">
          <label class="ctrl-label">Poštevanke</label>
          <div class="filter-dropdown">
            <button class="filter-btn" id="filterToggle">⚙ Vse ▾</button>
            <div class="filter-panel" id="filterPanel">
              <label class="toggle-lbl"><input type="checkbox" id="chk1"  checked> 1</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk2"  checked> 2</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk3"  checked> 3</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk4"  checked> 4</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk5"  checked> 5</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk6"  checked> 6</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk7"  checked> 7</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk8"  checked> 8</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk9"  checked> 9</label>
              <label class="toggle-lbl"><input type="checkbox" id="chk10" checked> 10</label>
            </div>
          </div>
        </div>

        <div class="ctrl-group">
          <button class="reload-btn" id="reloadBtn">↻ Začni</button>
        </div>

      </div>
    </div>
  </div>

  <!-- SCORE HUD (quiz mode) -->
  <div id="scoreHUD" class="score-hud" style="display:none">
    <div class="score-item score-correct">
      <span class="score-val" id="scoreCorrect">0</span>
      <span class="score-lbl">✅ Pravilno</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item score-wrong">
      <span class="score-val" id="scoreWrong">0</span>
      <span class="score-lbl">❌ Napačno</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item score-pct">
      <span class="score-val" id="scorePct">—</span>
      <span class="score-lbl">🎯 Točnost</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item">
      <div id="hudMedalSVG"></div>
      <span class="hud-medal-name" id="hudMedalName">—</span>
      <span class="score-lbl">Rang</span>
    </div>
    <div class="score-sep"></div>
    <div class="score-item">
      <span class="streak-hud" id="hudStreak" style="display:none"></span>
    </div>
  </div>

  <!-- FLASHCARD PANEL -->
  <div id="flashcardPanel" class="card-panel">
    <div class="card-counter" id="cardCounter">Kartica 0 od 0</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
    </div>
    <div id="cardContainer" class="card-container">
      <div class="card" id="flashcard">
        <div class="card-face card-front">
          <span class="card-text" id="cardFrontText">Pritisni ↻ Začni</span>
          <span class="flip-hint">klikni za obrat</span>
        </div>
        <div class="card-face card-back">
          <span class="card-text" id="cardBackText">🙂</span>
          <span class="flip-hint">klikni za obrat</span>
        </div>
      </div>
    </div>
    <div class="controls">
      <button class="btn" id="prevBtn" disabled>⬅️ Prejšnja</button>
      <button class="btn" id="nextBtn" disabled>Naslednja ➡️</button>
    </div>
    <div class="keyboard-hint">
      💡 Puščice za navigacijo · presledek za obrat · 👆 povleci levo/desno
    </div>
  </div>

  <!-- QUIZ PANEL -->
  <div id="quizPanel" class="quiz-panel" style="display:none">
    <div id="quizArea" class="quiz-area">
      <div class="quiz-empty">Pritisni ↻ Začni! 🎯</div>
    </div>
  </div>

  <!-- TIMED PANEL -->
  <div id="timedPanel" class="timed-panel" style="display:none">
    <div id="timedArea" class="timed-area">
      <div class="quiz-empty">Pritisni ↻ Začni! ⏱️</div>
    </div>
  </div>

</div>
<script src="script.js"></script>
</body>
</html>
